name: Build Bootstrap

on:
  workflow_dispatch:
    inputs:
      extra_packages:
        description: 'Additional packages (space-separated)'
        required: false
        default: ''
  schedule:
    - cron: '0 4 * * 0'  # Sundays 4am UTC

concurrency:
  group: bootstrap
  cancel-in-progress: true

jobs:
  build:
    name: Build Bootstrap (aarch64)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - uses: actions/checkout@v4

      - name: Build Docker image locally
        run: |
          # Build our own image from scripts/Dockerfile — no dependency on
          # ghcr.io/termux/package-builder which could be removed by upstream
          docker build -t novaterm/package-builder:latest scripts/

      - name: Generate bootstrap
        run: |
          EXTRA="${{ github.event.inputs.extra_packages }}"
          EXTRA_FLAG=""
          [ -n "$EXTRA" ] && EXTRA_FLAG="--add $EXTRA"

          # Use TERMUX_DOCKER_IMAGE_NAME to point to our local image
          export TERMUX_DOCKER_IMAGE_NAME="novaterm/package-builder:latest"
          ./scripts/run-docker.sh ./scripts/generate-bootstraps.sh \
            --architectures aarch64 \
            $EXTRA_FLAG

      - name: Calculate checksums
        run: |
          sha256sum bootstrap-*.zip > checksums-sha256.txt
          echo "=== Bootstrap ==="
          ls -lh bootstrap-*.zip
          cat checksums-sha256.txt

      - name: Smoke test bootstrap contents
        run: |
          mkdir -p /tmp/bootstrap-test
          cd /tmp/bootstrap-test
          unzip -q ${{ github.workspace }}/bootstrap-aarch64.zip
          echo "=== Verifying essential files ==="
          for f in bin/bash bin/sh bin/apt bin/dpkg lib/libtermux-exec.so; do
            [ -e "$f" ] && echo "OK: $f" || echo "MISSING: $f"
          done
          echo "=== SYMLINKS.txt entries ==="
          wc -l SYMLINKS.txt
          echo "=== Total files ==="
          find . -type f | wc -l

      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-aarch64
          path: |
            bootstrap-*.zip
            checksums-sha256.txt
          retention-days: 90

      - name: Create release
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bootstrap-${{ github.run_number }}
          name: "Bootstrap aarch64 (Build #${{ github.run_number }})"
          body: |
            NovaTerm bootstrap for `com.novaterm.app` (aarch64).

            **Usage:** Download `bootstrap-aarch64.zip`, place in
            `NovaTerm/app/src/main/cpp/`, rebuild APK.

            Extra packages: ${{ github.event.inputs.extra_packages || 'default set' }}
          files: |
            bootstrap-*.zip
            checksums-sha256.txt
          draft: false
