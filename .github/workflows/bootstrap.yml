name: Build Bootstrap

# Generates bootstrap archives by downloading pre-built .debs from the
# Termux APT repository and repackaging them into a ZIP.
#
# This uses generate-bootstraps.sh which does NOT need Docker — it only
# downloads and extracts packages. Docker is only needed for
# build-bootstraps.sh (compiles from source).
#
# This is the same approach as Termux's own bootstrap_archives.yml:
# https://github.com/termux/termux-packages/blob/master/.github/workflows/bootstrap_archives.yml

on:
  workflow_dispatch:
    inputs:
      extra_packages:
        description: 'Additional packages (comma-separated, e.g. openssh,git)'
        required: false
        default: ''
  schedule:
    - cron: '0 4 * * 0'  # Sundays 4am UTC

permissions: {}

concurrency:
  group: bootstrap
  cancel-in-progress: true

jobs:
  build:
    name: Build Bootstrap (aarch64)
    permissions:
      contents: write  # For creating releases
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          # generate-bootstraps.sh needs: ar, awk, curl, grep, gzip,
          # find, sed, tar, xargs, xz, zip, jq
          # Most are pre-installed on ubuntu-24.04. Ensure the rest:
          sudo apt-get update -qq
          sudo apt-get install -yqq binutils xz-utils zip jq

      - name: Generate bootstrap
        run: |
          EXTRA="${{ github.event.inputs.extra_packages }}"
          EXTRA_FLAG=""
          if [ -n "$EXTRA" ]; then
            EXTRA_FLAG="--add $EXTRA"
          fi

          # Run directly on the runner — no Docker needed.
          # generate-bootstraps.sh downloads pre-built .debs from the
          # Termux APT repository and repackages them.
          ./scripts/generate-bootstraps.sh \
            --architectures aarch64 \
            $EXTRA_FLAG

      - name: Calculate checksums
        run: |
          sha256sum bootstrap-*.zip > checksums-sha256.txt
          echo "=== Bootstrap ==="
          ls -lh bootstrap-*.zip
          cat checksums-sha256.txt

      - name: Smoke test bootstrap contents
        run: |
          mkdir -p /tmp/bootstrap-test
          cd /tmp/bootstrap-test
          unzip -q "${{ github.workspace }}/bootstrap-aarch64.zip"
          echo "=== Verifying essential files ==="
          for f in bin/bash bin/sh bin/apt bin/dpkg lib/libtermux-exec.so; do
            if [ -e "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
            fi
          done
          echo "=== SYMLINKS.txt ==="
          wc -l SYMLINKS.txt
          head -5 SYMLINKS.txt
          echo "=== Total files ==="
          find . -type f | wc -l
          echo "=== Archive size ==="
          du -sh "${{ github.workspace }}/bootstrap-aarch64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-aarch64
          path: |
            bootstrap-*.zip
            checksums-sha256.txt
          retention-days: 90

      - name: Create release
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="bootstrap-$(date '+%Y.%m.%d')-r${{ github.run_number }}"
          gh release create "$TAG" \
            --title "Bootstrap aarch64 ($TAG)" \
            --notes "$(cat <<'NOTES'
          NovaTerm bootstrap archive (aarch64).

          Built from Termux APT repository packages.
          PREFIX: /data/data/com.termux/files/usr

          **Usage:** Download `bootstrap-aarch64.zip` and place in
          `NovaTerm/app/src/main/cpp/`, then rebuild the APK.

          Extra packages: ${{ github.event.inputs.extra_packages || 'default set' }}
          NOTES
          )" \
            bootstrap-*.zip checksums-sha256.txt
